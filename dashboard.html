<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment Five Dashboard</title>
    <!--- Tailwind CSS and daisyUI CDN --->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="assets/android-chrome-512x512.png"
      type="image/x-icon"
    />
    <!-- Font Awesome CDN -->
    <script
      src="https://kit.fontawesome.com/c177988b3a.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="bg-[#F3F4F6] min-h-screen">
    <header>
      <div class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
          <div class="flex items-center gap-2">
            <img src="assets/github-logo.png" class="w-8 h-8" />
            <span class="font-bold text-xl hidden md:block"
              >GitHub Issues Tracker</span
            >
          </div>
          <div class="flex gap-2">
            <input
              id="search-input"
              type="text"
              placeholder="Search issues..."
              class="input input-bordered input-sm w-40 md:w-64"
            />
            <button
              onclick="handleSearch()"
              class="btn btn-primary btn-sm bg-[#6366F1] border-none text-white px-4"
            >
              Search
            </button>
          </div>
        </div>
      </div>
    </header>
    <main class="max-w-7xl mx-auto p-6">
      <div
        class="flex justify-center md:justify-start gap-2 mb-8 bg-white p-2 rounded-lg shadow-sm"
      >
        <button
          onclick="filterIssues('all')"
          class="btn btn-sm bg-[#6366F1] text-white border-none px-6"
        >
          All
        </button>
        <button
          onclick="filterIssues('open')"
          class="btn btn-sm btn-ghost px-6 border border-gray-100"
        >
          Open
        </button>
        <button
          onclick="filterIssues('closed')"
          class="btn btn-sm btn-ghost px-6 border border-gray-100"
        >
          Closed
        </button>
      </div>
    </main>
  </body>
</html>
