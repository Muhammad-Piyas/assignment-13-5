<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment Five Dashboard</title>
    <!--- Tailwind CSS and daisyUI CDN --->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="assets/android-chrome-512x512.png"
      type="image/x-icon"
    />
    <!-- Font Awesome CDN -->
    <script
      src="https://kit.fontawesome.com/c177988b3a.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-2">
          <img
            src="assets/github-logo.png"
            class="w-8 h-8"
          />
          <span class="font-bold text-xl hidden md:block"
            >GitHub Issues Tracker</span
          >
        </div>
  </body>
</html>
