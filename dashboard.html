<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment Five Dashboard</title>
    <!--- Tailwind CSS and daisyUI CDN --->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- favicon -->
    <link
      rel="shortcut icon"
      href="assets/android-chrome-512x512.png"
      type="image/x-icon"
    />
    <!-- Font Awesome CDN -->
    <script
      src="https://kit.fontawesome.com/c177988b3a.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="bg-[#F3F4F6] min-h-screen">
    <header>
      <div class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
          <div class="flex items-center gap-2">
            <img src="assets/github-logo.png" class="w-8 h-8" />
            <span class="font-bold text-xl hidden md:block"
              >GitHub Issues Tracker</span
            >
          </div>
          <div class="flex gap-2">
            <input
              id="search-input"
              type="text"
              placeholder="Search issues..."
              class="input input-bordered input-sm w-40 md:w-64"
            />
            <button
              onclick="handleSearch()"
              class="btn btn-primary btn-sm bg-[#6366F1] border-none text-white px-4"
            >
              Search
            </button>
          </div>
        </div>
      </div>
    </header>
    <main class="max-w-7xl mx-auto p-6">
      <div
        class="flex justify-center md:justify-start gap-2 mb-8 bg-white p-2 rounded-lg shadow-sm"
      >
        <button
          onclick="filterIssues('all')"
          class="btn btn-sm bg-[#6366F1] text-white border-none px-6"
        >
          All
        </button>
        <button
          onclick="filterIssues('open')"
          class="btn btn-sm btn-ghost px-6 border border-gray-200"
        >
          Open
        </button>
        <button
          onclick="filterIssues('closed')"
          class="btn btn-sm btn-ghost px-6 border border-gray-200"
        >
          Closed
        </button>
      </div>
      <div
        class="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100"
      >
        <div class="flex items-center gap-4">
          <div class="p-4 bg-purple-50 rounded-xl text-2xl">
            <i class="fa-solid fa-gear"></i>
          </div>
          <div>
            <h3 id="issue-count" class="font-bold text-2xl text-gray-800">
              0 Issues
            </h3>
            <p class="text-sm text-gray-400 italic">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <div class="flex gap-6 text-sm font-bold">
          <span class="flex items-center gap-2"
            ><span class="w-3 h-3 rounded-full bg-green-500"></span> Open</span
          >
          <span class="flex items-center gap-2"
            ><span class="w-3 h-3 rounded-full bg-purple-500"></span>
            Closed</span
          >
        </div>
      </div>
      <div
        id="issues-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"
      ></div>
      <div id="loader" class="hidden flex justify-center py-24">
        <span class="loading loading-spinner loading-lg text-[#6366F1]"></span>
      </div>
    </main>
    <dialog id="issue_modal" class="modal">
      <div
        class="modal-box w-11/12 max-w-2xl rounded-2xl border-t-8 border-[#6366F1]"
      >
        <div id="modal-content"></div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn bg-[#6366F1] text-white border-none px-8">
              Close
            </button>
          </form>
        </div>
      </div>
    </dialog>
  </body>
</html>
